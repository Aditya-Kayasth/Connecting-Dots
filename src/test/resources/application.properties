# ── Test datasource: H2 in-memory (replaces Neon PostgreSQL) ─────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ── Redis: disable auto-config (no real Redis needed in tests) ────────────────
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ── Satisfy @Value bindings ───────────────────────────────────────────────────
groq.api.key=test-key
GROQ_API_KEY=test-key
NEON_DB_URL=jdbc:h2:mem:testdb
NEON_DB_USERNAME=sa
NEON_DB_PASSWORD=
UPSTASH_REDIS_HOST=localhost
UPSTASH_REDIS_PORT=6379
UPSTASH_REDIS_PASSWORD=test
